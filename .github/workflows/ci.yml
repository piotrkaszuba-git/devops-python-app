name: DevOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops-app ./app

      - name: Run container
        run: docker run -d -p 8000:8000 devops-app

      - name: Wait for app
        run: sleep 10

      - name: Show containers
        run: docker ps -a

      - name: Show logs
        run: |
          CONTAINER_ID=$(docker ps -aq)
          if [ -n "$CONTAINER_ID" ]; then
            docker logs $CONTAINER_ID
          else
            echo "No containers found"
          fi

      - name: Test app
        run: curl http://localhost:8000

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Tag image
        run: |
          docker tag devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/app
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
            docker-compose up -d --force-recreate
